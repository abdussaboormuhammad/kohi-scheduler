name: Daily hourly weather cache

# Goal: run once per day at 5:00 AM America/Chicago.
# GitHub cron is UTC and ignores daylight saving, so we schedule both
# candidate UTC times (5 AM CDT = 10:00 UTC, 5 AM CST = 11:00 UTC) and let a
# guard step skip the run whose Central-time hour isn't 5. Exactly one of the
# two fires per day, year-round. Same pattern as the pastry planner repo.
on:
  schedule:
    - cron: "0 10 * * *"  # 5 AM Central during CDT (summer, UTC-5)
    - cron: "0 11 * * *"  # 5 AM Central during CST (winter, UTC-6)
  workflow_dispatch: {}   # manual runs always proceed

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check Central-time hour
        id: guard
        run: |
          hour=$(TZ=America/Chicago date +%-H)
          if [ "$hour" = "5" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: Central hour is $hour, not 5 (DST-mirror cron entry)."
          fi

      - name: Checkout
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Fetch hourly business-hours weather
        if: steps.guard.outputs.proceed == 'true'
        run: python3 fetch_weather_hourly_cache.py

      - name: Commit and push cache
        if: steps.guard.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather_hourly_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update hourly weather cache ($(TZ=America/Chicago date +%F))"
          git pull --rebase origin main
          git push origin main
