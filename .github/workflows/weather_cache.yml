name: Daily hourly weather cache

# Goal: refresh the cache once per day before Kohi opens (6 AM Central).
# A single 09:30 UTC cron lands at 4:30 AM CDT / 3:30 AM CST — early
# enough that even GitHub's cron start delays (often 30-70 min) keep the
# run pre-open in both DST regimes, with no guard step needed.
#
# (The previous design — dual 10:00/11:00 UTC crons with a "Central hour
# must be exactly 5" guard — silently skipped most days, because cron
# delays pushed execution past the 5 o'clock hour.)
on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch hourly business-hours weather
        run: python3 fetch_weather_hourly_cache.py

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather_hourly_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update hourly weather cache ($(TZ=America/Chicago date +%F))"
          git pull --rebase origin main
          git push origin main
